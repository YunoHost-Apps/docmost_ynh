#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2
id = "docmost"
name = "Docmost"
description.en = "Collaborative wiki and documentation"
description.fr = "Wiki collaboratif et documentation"

version = "0.80.2~ynh1"

maintainers = ["otm33GH", "eric_G"]

[upstream]
license = "GPL-3.0-only"
website = "https://docmost.com/"
admindoc = "https://docmost.com/docs/"
code = "https://github.com/docmost/docmost"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "2000M"
ram.build = "1500M"
ram.runtime = "500M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/docmost/docmost/archive/refs/tags/v0.80.2.tar.gz"
    sha256 = "6dc76b49b42fe658bebca167d1a11202e84ee48bde8886a7edee7cdf23f54cbe"
    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]
	allow_email = true

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false

    [resources.ports]

    [resources.apt]
    packages = "postgresql, redis-server"

    [resources.database]
    type = "postgresql"

    [resources.nodejs]
    version = "22"
